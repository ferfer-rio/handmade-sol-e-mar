<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férfer | Beach Culture</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header id="main-header">
        <div class="top-bar">
            <div class="search-container desktop-only">
                <input type="text" id="search-input" placeholder="O que você está buscando?">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            
            <div class="logo-container">
                <img src="imagens/ferfer-riologofundotransp.png" alt="Férfer Logo" id="main-logo">
            </div>

            <div class="user-icons desktop-only">
                <i class="fa-solid fa-globe"></i>
                <i class="fa-regular fa-user"></i>
                <i class="fa-regular fa-heart"></i>
                <i class="fa-solid fa-bag-shopping"></i>
            </div>
        </div>

        <nav class="main-nav desktop-only">
            <ul>
                <li><a href="#">Tops</a></li>
                <li><a href="#">Camisas</a></li>
                <li><a href="#">Blusas</a></li>
                <li><a href="#">Calças</a></li>
                <li><a href="#">Vestidos</a></li>
                <li><a href="#">Saias</a></li>
                <li><a href="#">Biquínis</a></li>
                <li><a href="#">Acessórios</a></li>
                <li><a href="#">Conjuntos</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-banner">
            <div class="hero-image" style="background-image: url('imagens/backgroundferfer.png');">
                <div class="hero-text">
                    <h1>COLEÇÃO</h1>
                    <h2>VERANO</h2>
                    <h3>2026</h3>
                </div>
            </div>
        </section>

        <section class="product-section">
            <h2 class="section-title">Últimos lançamentos</h2>
            <div class="product-grid" id="latest-products">
                <div class="product-card">
                    <img src="https://images.unsplash.com/photo-1590550146019-18b0a58f129c?q=80&w=500" alt="Produto">
                    <h3>Vestido Eze Tule Verde</h3>
                    <p>R$ 889,00</p>
                </div>
                <div class="product-card">
                    <img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?q=80&w=500" alt="Produto">
                    <h3>Vestido Sahara Tule Onça</h3>
                    <p>R$ 889,00</p>
                </div>
                <div class="product-card">
                    <img src="https://images.unsplash.com/photo-1620916566398-39f1143ab7be?q=80&w=500" alt="Produto">
                    <h3>Saia Zuri Longa Tule Onça</h3>
                    <p>R$ 629,00</p>
                </div>
            </div>
        </section>
    </main>

    <nav class="mobile-bottom-nav">
        <a href="#" class="nav-item"><i class="fa-solid fa-house"></i></a>
        <a href="#" class="nav-item" id="open-menu"><i class="fa-solid fa-bars"></i></a>
        <a href="#" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="#" class="nav-item"><i class="fa-regular fa-user"></i></a>
        <a href="#" class="nav-item"><i class="fa-solid fa-bag-shopping"></i></a>
    </nav>

    <script src="index.js"></script>
</body>
</html>
